# Qwen2VL中医训练配置
model_name_or_path: "Qwen/Qwen2-VL-2B-Instruct"
train_dataset_path: "/root/autodl-tmp/data/tcm_trainval_data.jsonl"
eval_dataset_path: "/root/autodl-tmp/data/tcm_val_data.jsonl"
test_dataset_path: "/root/autodl-tmp/data/tcm_test_data.jsonl"
output_dir: "/root/autodl-tmp/qwen2vl_tcm_lora"

# 训练参数
num_train_epochs: 5
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 2e-4
warmup_ratio: 0.03
logging_steps: 10
save_steps: 100
eval_steps: 100
save_total_limit: 2

# LoRA配置
use_lora: true
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.1

# 硬件配置
fp16: true
gradient_checkpointing: true
